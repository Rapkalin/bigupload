# =============================================================================
# Nginx vhost — BigUpload (Symfony front controller pattern)
# Mounted as /etc/nginx/conf.d/default.conf by compose.yaml
# =============================================================================

server {
    listen 80;
    server_name localhost;
    root /var/www/api/public;

    # Chunked uploads (PLupload): 250 MB per chunk + margin.
    # Must match upload_max_filesize/post_max_size in docker/php.ini.
    client_max_body_size 300M;

    # Long uploads: aligned with set_time_limit(300) in ItemController
    fastcgi_read_timeout 300s;
    client_body_timeout 300s;

    # Static files (public/assets, public/uploads, ...) served directly;
    # everything else goes through the Symfony front controller.
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    # Return 404 for all other php files to prevent direct execution
    location ~ \.php$ {
        return 404;
    }
}
