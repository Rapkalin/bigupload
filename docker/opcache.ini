; =============================================================================
; OPcache settings — BigUpload
; Copied to /usr/local/etc/php/conf.d/opcache.ini by the Dockerfile
; =============================================================================

opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000

; validate_timestamps=1 is required in development: the source is mounted as a
; volume and changes constantly. revalidate_freq=0 re-checks on every request.
; (In production these could be 0/disabled for max performance.)
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
