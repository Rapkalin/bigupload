; =============================================================================
; PHP settings — BigUpload
; Copied to /usr/local/etc/php/conf.d/app.ini by the Dockerfile
; =============================================================================

; Chunked uploads (PLupload): 250 MB per chunk + multipart overhead margin.
; The 15 GB max file size is handled client-side by chunking — each HTTP
; request never exceeds one chunk, so no need for multi-GB limits here.
upload_max_filesize = 300M
post_max_size = 300M
max_file_uploads = 20

; ItemController::handleFile() calls set_time_limit(5 * 60) — align defaults
max_execution_time = 300
max_input_time = 300

memory_limit = 512M

date.timezone = Europe/Paris
expose_php = Off
